# =============================================================================
# ReConnect - Configuracao Nginx SSL (Producao)
# Descricao: HTTPS com HTTP/2, rate limiting, seguranca e proxy Evolution API
# =============================================================================

# Rate limiting - protecao contra abuso
# 10 req/s por IP para paginas, 5 req/s para API
limit_req_zone $binary_remote_addr zone=geral:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

# Redirecionar HTTP para HTTPS
server {
    listen 80;
    server_name reconnect.oxineo.com.br;

    # Challenge ACME para renovacao do certificado Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirecionar todo HTTP para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name reconnect.oxineo.com.br;

    ssl_certificate /etc/letsencrypt/live/reconnect.oxineo.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reconnect.oxineo.com.br/privkey.pem;

    # Configuracoes SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling - melhora performance de verificacao SSL
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    root /usr/share/nginx/html;
    index index.html;

    # Rate limiting global
    limit_req zone=geral burst=20 nodelay;
    limit_req_status 429;

    # Compressao Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/manifest+json
        image/svg+xml
        text/xml;

    # Headers de seguranca
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://reconnect.oxineo.com.br; media-src 'self'; frame-src https://www.asaas.com;" always;

    # Proxy reverso para Evolution API
    location /api/evolution/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://evolution:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header apikey ${EVOLUTION_API_KEY};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Roteamento SPA (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets estaticos com cache longo (Vite gera hashes nos nomes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cache para imagens
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Cache para fontes
    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Cache para video de fundo
    location ~* \.(mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
