services:
  app:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: https://xbmhfijiljrwnifeqmei.supabase.co
        VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_1rKOgC-lCnCsalDejfltHg_KnqBgS46
        VITE_SUPABASE_PROJECT_ID: xbmhfijiljrwnifeqmei
    container_name: reconnect-app
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
    volumes:
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf.template:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - certbot
      - evolution
    command: /bin/sh -c "envsubst '$$EVOLUTION_API_KEY' < /etc/nginx/conf.d/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: reconnect-evolution
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - SERVER_URL=https://reconnect.oxineo.com.br/api/evolution
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${EVOLUTION_DB_PASS}@evolution-db:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - CACHE_REDIS_ENABLED=false
      - CACHE_REDIS_URI=
      - CACHE_REDIS_PREFIX_KEY=
      - CACHE_LOCAL_ENABLED=true
    volumes:
      - evolution-instances:/evolution/instances
    depends_on:
      - evolution-db

  evolution-db:
    image: postgres:16-alpine
    container_name: reconnect-evolution-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${EVOLUTION_DB_PASS}
      - POSTGRES_DB=evolution
    volumes:
      - evolution-pgdata:/var/lib/postgresql/data

  certbot:
    image: certbot/certbot
    container_name: reconnect-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Initial cert generation (run once):
    #   docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d reconnect.oxineo.com.br --email your@email.com --agree-tos --no-eff-email
    # Auto-renewal via entrypoint:
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  certbot-webroot:
  certbot-certs:
  evolution-instances:
  evolution-pgdata:
