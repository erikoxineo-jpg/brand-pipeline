# =============================================================================
# ReConnect CRM - Docker Compose (Producao)
# Descricao: App Nginx + Evolution API + PostgreSQL + Certbot SSL
# VPS: reconnect.oxineo.com.br (4 vCPU / 8GB RAM)
# =============================================================================

services:
  app:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: https://xbmhfijiljrwnifeqmei.supabase.co
        VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_1rKOgC-lCnCsalDejfltHg_KnqBgS46
        VITE_SUPABASE_PROJECT_ID: xbmhfijiljrwnifeqmei
    container_name: reconnect-app
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
    volumes:
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf.template:ro
      - ./nginx-performance.conf:/etc/nginx/conf.d/performance.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - certbot
      - evolution
    command: >
      /bin/sh -c "envsubst '$$EVOLUTION_API_KEY' < /etc/nginx/conf.d/default.conf.template
      > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    mem_limit: 256m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-net

  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: reconnect-evolution
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - SERVER_URL=https://reconnect.oxineo.com.br/api/evolution
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${EVOLUTION_DB_PASS}@evolution-db:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - CACHE_REDIS_ENABLED=false
      - CACHE_REDIS_URI=
      - CACHE_REDIS_PREFIX_KEY=
      - CACHE_LOCAL_ENABLED=true
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=https://xbmhfijiljrwnifeqmei.supabase.co/functions/v1/evolution-webhook
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
    volumes:
      - evolution-instances:/evolution/instances
    depends_on:
      - evolution-db
    mem_limit: 1g
    cpus: 2.0
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - app-net
      - db-net

  evolution-db:
    image: postgres:16-alpine
    container_name: reconnect-evolution-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${EVOLUTION_DB_PASS}
      - POSTGRES_DB=evolution
    volumes:
      - evolution-pgdata:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c effective_cache_size=256MB
      -c max_connections=50
      -c log_min_duration_statement=1000
      -c checkpoint_completion_target=0.9
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - db-net

  certbot:
    image: certbot/certbot
    container_name: reconnect-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Geracao inicial do certificado (executar uma vez):
    #   docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d reconnect.oxineo.com.br --email erikoxineo@gmail.com --agree-tos --no-eff-email
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    mem_limit: 64m
    cpus: 0.25
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
  db-net:
    driver: bridge
    internal: true

volumes:
  certbot-webroot:
  certbot-certs:
  evolution-instances:
  evolution-pgdata:
