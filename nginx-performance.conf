# =============================================================================
# ReConnect - Configuracoes de Performance do Nginx
# Descricao: Buffers, timeouts e limites otimizados para VPS 4vCPU/8GB
# =============================================================================

# Limite de upload (planilhas Excel de leads)
client_max_body_size 10m;

# Buffers de requisicao
client_body_buffer_size 128k;
large_client_header_buffers 4 16k;

# Timeout de envio
send_timeout 10;
